<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>채팅방</title>
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' ws://localhost:8080 http://localhost:8080 https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:;">
        <style>
            body { margin : 0; padding: 10px; font-family: sans-serif; display: flex; flex-direction: column; height: 95vh;}

            /* 화면을 좌우로 나누는 Flexbox 컨테이너 */
            main-contaier { display: flex; flex: 1; overflow: hidden; gap: 10px; }

            /* 채팅 영역*/
            .char-section { flex: 1; display: flex; flex-direction: column;  }
            #chat-box {flex: 1; border: 1px solid #ccc; overflow-y: auto; padding: 15px; margin-bottom: 10px; background: #fff;}

            /* 이모지 사이드바*/
            .emoji-section { width: 320px; display: none; border: 1px solid #ccc; background: #f9f9f9;}

            .input-group { display: flex; gap: 5px; margin-bottom: 5px;}
            .input-group input { flex: 1; padding: 8px;}
            button {padding: 8px 12px; cursor: pointer;}
        </style>
    </head>
    <body>
        <div style="margin-bottom: 10px; padding: 10px; background: #eee; border-radius: 4px;">
            <strong>접속자 : <span id="currentUserDisplay"></span></strong>
            <button id="logoutBtn" style="float: right;">나가기</button>
        </div>

        <div class="main-container"></div>
        <div class="chat-section">
            <div id="chatBox">
                
                <div class="input-group">
                    <input type="text" id="targetInput" placeholder="상대방 아이디(ex: userB)">
                </div>

                <div class="input-group">
                    
                    <input type="text" id="messageInput" placeholder="메시지를 입력해 주세요.">
                    <button id="emojiBtn">이모지</button>
                    <button id="sendBtn">전송</button>
                </div>
                <div id="errorMsg" style="color : red; font-size: 12px; min-height: 15px;"></div>
            
            </div>
            <div class="emoji-section" id="emojiSidebar">
                <emoji-picker style="width: 100%; height: 100%;"></emoji-picker>
            </div>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
        <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
        <script src="chat.js"></script>
    </body>
</html>
